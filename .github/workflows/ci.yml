name: 'CI'

on:
  push:
    branches:
      - 'master'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: 'CI'
    runs-on: 'ubuntu-latest'

    steps:
      - uses: 'actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1' # v7.0.1
        with:
          fetch-depth: 0

      - uses: 'moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095' # v0.6.4
        with:
          auto-install: true

      - run: 'moon ci --color'

      - uses: 'moonrepo/run-report-action@bbe7e99bf2aca819ec660ec01fc59d84bdd492d6' # v1.10.0
        if: success() || failure()
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}
