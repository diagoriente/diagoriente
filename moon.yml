stack: 'infrastructure'
layer: 'configuration'

tasks:
  lint:
    command: 'oxlint --disable-nested-config'

  lint-fix:
    command: 'oxlint --disable-nested-config --fix'
    options:
      runInCI: false

  format:
    command: 'oxfmt --disable-nested-config'
    options:
      runInCI: false

  format-check:
    command: 'oxfmt --disable-nested-config --check'
